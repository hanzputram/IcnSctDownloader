<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IconScout Bot - Automatic Asset Downloader Dashboard">
    <title>IconScout Bot — Dashboard</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout" id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">iS</div>
                <div class="sidebar-brand">
                    <h1>IconScout</h1>
                    <span>Bot v1.0</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
                        <span class="nav-icon">📊</span>
                        <span>Dashboard</span>
                    </div>
                    <div class="nav-item" data-page="accounts" onclick="navigate('accounts')">
                        <span class="nav-icon">👤</span>
                        <span>Accounts</span>
                        <span class="nav-badge" id="nav-badge-accounts">0</span>
                    </div>
                    <div class="nav-item" data-page="tasks" onclick="navigate('tasks')">
                        <span class="nav-icon">📥</span>
                        <span>Downloads</span>
                        <span class="nav-badge" id="nav-badge-tasks">0</span>
                    </div>
                    <div class="nav-item" data-page="scheduler" onclick="navigate('scheduler')">
                        <span class="nav-icon">⏰</span>
                        <span>Scheduler</span>
                    </div>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">System</div>
                    <div class="nav-item" data-page="logs" onclick="navigate('logs')">
                        <span class="nav-icon">📋</span>
                        <span>Logs</span>
                        <span class="nav-badge" id="nav-badge-logs">0</span>
                    </div>
                    <div class="nav-item" data-page="settings" onclick="navigate('settings')">
                        <span class="nav-icon">⚙️</span>
                        <span>Settings</span>
                    </div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="quickDownload()">
                    ⚡ Quick Download
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-search">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Search assets, tasks, logs..." id="globalSearch" onkeyup="handleGlobalSearch(event)">
                </div>
                <div class="header-actions">
                    <button class="btn btn-sm btn-ghost" onclick="refreshData()" title="Refresh">🔄</button>
                    <div class="header-user">
                        <div class="user-info">
                            <div class="user-name" id="headerUserName">IconScout Bot</div>
                            <div class="user-email" id="headerUserEmail">Ready</div>
                        </div>
                        <div class="avatar">🤖</div>
                    </div>
                </div>
            </header>

            <!-- Page Content (Dynamic) -->
            <div class="page-content" id="pageContent">
                <!-- Content will be rendered here by JS -->
            </div>
        </main>
    </div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()">
            <!-- Modal content rendered by JS -->
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="/static/js/app.js"></script>
    <script src="/static/js/components/dashboard.js"></script>
    <script src="/static/js/components/accounts.js"></script>
    <script src="/static/js/components/tasks.js"></script>
    <script src="/static/js/components/scheduler.js"></script>
    <script src="/static/js/components/logs.js"></script>
    <script src="/static/js/components/settings.js"></script>
</body>
</html>
